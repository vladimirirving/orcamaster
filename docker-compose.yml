services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orcaavml}
      POSTGRES_USER: ${POSTGRES_USER:-orcaavml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orcaavml}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-orcaavml}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./tests:/app/tests
      - pacotes_data:/app/pacotes
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-orcaavml}:${POSTGRES_PASSWORD:-orcaavml}@db:5432/${POSTGRES_DB:-orcaavml}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32-chars-min}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PACOTES_DIR: /app/pacotes
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
  pacotes_data:
